<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" width="200" height="60">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#003366"/>
      <stop offset="100%" style="stop-color:#004080"/>
    </linearGradient>
  </defs>

  <!-- Icona -->
  <rect x="5" y="10" width="40" height="40" rx="10" fill="url(#logoGrad)"/>
  <line x1="15" y1="30" x2="35" y2="30" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <line x1="25" y1="20" x2="25" y2="40" stroke="#00C853" stroke-width="3" stroke-linecap="round"/>

  <!-- Testo Brevett -->
  <text x="55" y="28" font-family="Inter, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#003366">Brevett</text>

  <!-- I accent -->
  <text x="135" y="28" font-family="Inter, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#00C853">I</text>

  <!-- Amo -->
  <text x="145" y="28" font-family="Inter, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#003366">Amo</text>

  <!-- Tagline -->
  <text x="55" y="45" font-family="Inter, -apple-system, sans-serif" font-size="9" font-weight="400" fill="#8a8a9a">Brevetti. Marchi. Disegni. AI.</text>
</svg>